<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/icon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#101418" />
  <title>Pix3 Preview</title>
  <style>
    :root {
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #101418;
      font-family: "Segoe UI", system-ui, sans-serif;
      color: #f5f7fa;
      overscroll-behavior: none;
      touch-action: none;
    }

    #app {
      position: fixed;
      inset: 0;
    }

    #app canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #player-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: radial-gradient(circle at top, #232a33 0%, #14181d 60%, #0b0e11 100%);
      z-index: 10;
    }

    .player-status-card {
      width: min(420px, 100%);
      padding: 28px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 18px;
      background: rgba(10, 13, 15, 0.82);
      text-align: center;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.32);
    }

    .player-status-brand {
      margin: 0 0 16px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #ffcf33;
    }

    #player-status-title {
      margin: 0 0 8px;
      font-size: 20px;
      font-weight: 600;
    }

    #player-status-detail {
      margin: 0;
      line-height: 1.5;
      color: rgba(245, 247, 250, 0.72);
      word-break: break-word;
    }
  </style>
  <script type="module" src="/src/player/player-main.ts"></script>
</head>

<body>
  <div id="app"></div>
  <div id="player-overlay">
    <div class="player-status-card">
      <p class="player-status-brand">Pix3 Preview</p>
      <p id="player-status-title">Loading…</p>
      <p id="player-status-detail">Preparing the preview player.</p>
    </div>
  </div>
</body>

</html>
